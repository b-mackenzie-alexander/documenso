name: 'Continuous Integration'

on:
  workflow_call:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  branch-guard:
    name: Branch Guard
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          BRANCH="${{ github.head_ref }}"

          # Push events to main (merges) — no branch name to check
          if [ -z "$BRANCH" ]; then
            echo "Push to main — skipping branch name validation."
            exit 0
          fi

          echo "Source branch: $BRANCH"

          if ! echo "$BRANCH" | grep -qE '^(feat|fix|chore|test|doc|docs|hotfix|dependabot)/'; then
            echo "::error::Branch '$BRANCH' does not follow naming conventions."
            echo "::error::Expected prefix: feat/, fix/, chore/, test/, doc/, docs/, hotfix/, or dependabot/"
            echo "::error::Example: feat/doc-42-reminder-sweep-job"
            exit 1
          fi

          echo "Branch '$BRANCH' passes validation."

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/node-install

      - name: Copy env
        run: cp .env.example .env

      # Type errors are caught by the Build App job (turbo run build).
      # Running tsc --noEmit at the repo root fails because there is no root
      # tsconfig.json in this monorepo — each package has its own.

      - name: Lint
        run: npm run lint

      - name: Format check
        # Scope to files changed in this PR only — the upstream codebase has
        # pre-existing Prettier violations that we cannot fix in a contribution fork.
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD \
            | grep -E '\.(ts|tsx|js|jsx|cjs|mjs|cts|mts|mdx)$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No relevant files changed — skipping format check."
            exit 0
          fi
          echo "Checking format on changed files:"
          echo "$CHANGED"
          echo "$CHANGED" | xargs npx prettier --check

      - name: Check for Prisma migration conflicts
        run: |
          git fetch origin main --quiet

          BASE_MIGRATIONS=$(git ls-tree --name-only origin/main packages/prisma/migrations/ 2>/dev/null | sort || echo "")
          HEAD_MIGRATIONS=$(ls -1 packages/prisma/migrations/ 2>/dev/null | sort || echo "")

          if [ -z "$HEAD_MIGRATIONS" ]; then
            echo "No migrations directory found — skipping."
            exit 0
          fi

          NEW_MIGRATIONS=$(comm -13 <(echo "$BASE_MIGRATIONS") <(echo "$HEAD_MIGRATIONS") 2>/dev/null || echo "")

          if [ -z "$NEW_MIGRATIONS" ]; then
            echo "No new migrations in this branch."
            exit 0
          fi

          echo "New migrations in this PR:"
          echo "$NEW_MIGRATIONS"

          for FILE in $NEW_MIGRATIONS; do
            # Prisma migration dirs are named {timestamp}_{description}
            TIMESTAMP=$(echo "$FILE" | grep -oE '^[0-9]+')
            if [ -z "$TIMESTAMP" ]; then continue; fi
            EXISTING=$(echo "$BASE_MIGRATIONS" | grep "^${TIMESTAMP}" || true)
            if [ -n "$EXISTING" ]; then
              echo "::error::Migration timestamp collision: $FILE conflicts with $EXISTING already on main"
              exit 1
            fi
          done

          echo "No migration timestamp conflicts detected."

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/node-install

      # npm audit is intentionally omitted here. This is a contribution fork of
      # documenso/documenso and all current vulnerabilities are pre-existing in
      # upstream's dependency tree (axios critical, lodash-es, vite, etc.). Patching
      # them in the fork would pollute the upstream PR diff. Security findings should
      # be reported as issues on the upstream repo, not fixed in the fork.
      # See NOTES.md §Security for the current known-vulnerability inventory.

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  build_app:
    name: Build App
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: ./.github/actions/node-install

      - name: Copy env
        run: cp .env.example .env

      - name: Build app
        run: npm run build

  build_docker:
    name: Build Docker Image
    # Only build Docker on pushes to main (merges), not on every PR — expensive step
    if: github.event_name == 'push' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    needs: [build_app]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4 # v4 required: v3 uses deprecated Node.js 20 runtime
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          push: false
          context: .
          file: ./docker/Dockerfile
          tags: documenso-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
